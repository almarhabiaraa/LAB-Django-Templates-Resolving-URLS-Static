{% extends 'main/base.html' %}
{% load static %}


{% block title %}Google Search{%endblock%}


{% block main_content %}

        <div class="main-content">

            <div class="logo-container">
                <img src="{% static 'images/google-logo.png' %}" alt="Google Logo" class="logo">
            </div>

            <div class="search-container"> 
                <form action="{% url 'main:search' %}" method="get">
                    <input type="text" name="q" placeholder="Search Google or type a URL" required>
                    <button type="submit">Search</button>
                </form>
            </div>

            <div class="buttons-container">
                <button type="submit">Google Search</button>
                <button type="submit">I'm Feeling Lucky</button>
            </div>  

             <div class="language-container">
                <p>Google offered in: <a class="language-link" href="">Arabic</a> </p>
            </div>

        </div>
{% endblock %}
